services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      STOCK_API_BASE_URL: ${STOCK_API_BASE_URL:-http://host.docker.internal:8080}
      RESEARCH_ALLOW_FIXTURE_FALLBACK: ${RESEARCH_ALLOW_FIXTURE_FALLBACK:-true}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-3000}:3000"
