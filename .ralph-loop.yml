project:
  name: "stock"
  repo: "alpaka206/stock"
  language: "ko"
  locale: "ko-KR"

goal: |
  `stock`를 초보자도 이해할 수 있고 숙련자도 계속 보게 되는 주식 분석 워크스페이스로 발전시킨다.
  국장과 미장을 모두 다루며 시장 개요, 스크리너, 종목 상세, 뉴스, 캘린더, 히스토리를 하나의 흐름으로 연결한다.
  차트는 단순 시각화가 아니라 이동평균선, 거래량, 이벤트, 추세 해석, 리스크 경고를 함께 보여 주는 보조 도구여야 한다.
  차트 패턴 도감과 현재 차트 유사 패턴을 함께 보여 주고, "지금 이런 흐름으로 진행 중"이라는 설명형 해석을 제공한다.
  일반적인 기술 선택은 사용자에게 묻지 않고 진행하고, 결제·비밀정보·배포·되돌릴 수 없는 데이터 작업만 확인한다.
  Discord는 원격 제어, 감사 로그, 필수 확인 요청 채널로만 사용한다.

minimum_done:
  - "국장과 미장 종목을 같은 검색 경험 안에서 조회하고 비교할 수 있다"
  - "overview, radar, stocks/[symbol], history, news, calendar가 하나의 제품 흐름으로 연결된다"
  - "종목 상세 화면에서 가격 차트와 이동평균선(MA5/10/20/60/120), 거래량, 이벤트 마커를 함께 보여 준다"
  - "차트 해석 패널에서 현재 추세, 지지/저항, 거래량 변화, 이동평균 배열, 변동성 리스크를 한국어로 요약한다"
  - "패턴 카드 영역에서 cup with handle, double bottom, flat base 같은 대표 패턴을 설명형으로 보여 준다"
  - "현재 차트와 유사한 패턴, 아직 형성 중인 단계, 주의해야 할 무효화 조건을 한국어로 설명한다"
  - "초보자용 쉬운 설명과 숙련자용 근거 요약이 같은 화면 안에서 공존한다"
  - "국장 데이터는 KRX, KIND, DART 계열 공식 출처와 연결 가능한 구조를 유지한다"
  - "미장 데이터는 SEC EDGAR, Nasdaq 계열 공식 출처와 연결 가능한 구조를 유지한다"
  - "데이터마다 출처, 지연 여부, unavailable 이유를 명확히 표시한다"
  - "변경사항은 issue 브랜치에서만 커밋한다"
  - "issue 브랜치에서 develop_loop로 향하는 PR이 생성되거나 갱신된다"
  - "develop_loop에서 develop로 향하는 승격 PR이 필요할 때 생성된다"
  - "main, develop, develop_loop에는 직접 커밋하거나 직접 push하지 않는다"
  - "사용자 확인은 결제, 인증정보, 외부 계정, 프로덕션 배포, 비가역 데이터 작업에만 요청한다"

loop:
  max_iterations: 40
  failure_threshold: 3
  continue_without_user_by_default: true

ask_user_only_when:
  - "유료 서비스 결제나 구독 변경이 필요하다"
  - "API key, secret, token, 외부 계정 인증정보가 필요하다"
  - "외부 계정 로그인이나 권한 확인이 필요하다"
  - "프로덕션 배포가 필요하다"
  - "DB migration 또는 데이터 작업이 비가역적이거나 위험하다"

writing:
  language: "ko"
  style: "모든 진행 요약, Discord 메시지, 로그 요약, 설명, PR 요약은 한국어로 작성한다."
  avoid:
    - "불필요한 영어 설명"
    - "과장된 보고체"
    - "내용 없는 AI 말투"

context_docs:
  - "docs/design/stock-reference-blueprint.md"
  - "docs/design/chart-pattern-atlas.md"
  - "docs/prompts/09-완성형-주식-분석-사이트.md"
  - "docs/design/design-memory.md"

product:
  target_users:
    - "주식을 처음 보는 입문자"
    - "차트, 수급, 공시, 섹터 흐름을 함께 보는 숙련 사용자"
  markets:
    - "KRX: KOSPI, KOSDAQ, KONEX 관련 흐름"
    - "US: NYSE, NASDAQ, AMEX 관련 흐름"
  priorities:
    - "쉽게 읽히는 요약"
    - "근거가 있는 차트 해석"
    - "공시, 뉴스, 캘린더, 섹터 문맥 연결"
    - "데이터 출처와 지연 상태 설명"

chart_policy:
  default_overlays:
    - "MA5"
    - "MA10"
    - "MA20"
    - "MA60"
    - "MA120"
    - "Volume"
  interpretation_rules:
    - "골든크로스와 데드크로스, 단기·중기·장기 배열, 거래량 급증, 박스권 돌파·이탈을 설명한다"
    - "단정적 매수·매도 조언이 아니라 관찰 포인트와 주의 신호를 설명한다"
    - "차트 해석은 투자 조언이 아니라 현재 구조 해설이라는 점을 분명히 한다"
    - "대표 패턴 카드와 현재 차트 유사 패턴을 함께 보여 주고, 유사 이유와 무효화 조건을 설명한다"
  novice_mode:
    - "한 줄 요약"
    - "왜 그렇게 보이는지 쉬운 설명"
    - "패턴 그림 카드와 현재 차트 비교 요약"
  pro_mode:
    - "지표 근거"
    - "기간별 비교"
    - "이벤트와 차트의 시간 정렬"
    - "패턴 유사도, 거래량 확인, 무효화 기준"

references:
  inspirations:
    - "https://www.tradingview.com/support/solutions/43000718866-tradingview-stock-screener-trade-smarter-not-harder/"
    - "https://www.koyfin.com/features/market-dashboards/"
    - "https://finviz.com/help/screener.ashx"
    - "https://www.nasdaq.com/market-activity/stocks/screener"
    - "https://www.investing.com/technical/stocks-indicators"
  official_data_sources:
    - "https://data.krx.co.kr/"
    - "https://kind.krx.co.kr/common/JLDDST35000.html"
    - "https://dart2.fss.or.kr/"
    - "https://opendart.fss.or.kr/"
    - "https://www.sec.gov/search-filings"
    - "https://www.nasdaq.com/market-activity/"

runtime:
  bridge_host: "127.0.0.1"
  bridge_port: 8787
  ascii_workspace_drive: "X:"

discord:
  mode: "all"
  channel_id: ""
  thread_per_run: false
  notify_on:
    - "start"
    - "issue_created"
    - "pr_created"
    - "tests_failed_3_times"
    - "blocked"
    - "needs_paid_service"
    - "needs_secret"
    - "merge_done"
    - "complete"
  remote_commands:
    - "/ralph status"
    - "/ralph pause"
    - "/ralph resume"
    - "/ralph stop"
    - "/ralph nudge <message>"
    - "/ralph goal <message>"
    - "/ralph done <message>"
    - "/ralph logs"
    - "/ralph pr"

git:
  base_branch: "develop_loop"
  protected_branches:
    - "main"
    - "develop"
    - "develop_loop"
  no_commit_on:
    - "main"
    - "develop"
    - "develop_loop"
  no_direct_push_to:
    - "main"
    - "develop"
    - "develop_loop"
  issue_branch_prefix: "issue"
  issue_title_format: "<type>: <summary>"
  issue_title_prefixes:
    - "feat"
    - "fix"
    - "refactor"
    - "docs"
    - "chore"
    - "ci"
    - "test"
    - "perf"
  forbid_generic_issue_titles: true
  pr_base: "develop_loop"
  merge_strategy: "squash"
  promote_to_develop:
    source_branch: "develop_loop"
    target_branch: "develop"
    strategy: "merge"
    approval_required: true
  release_to_main:
    source_branch: "develop"
    target_branch: "main"
    strategy: "merge"
    author: "alpaka206"
    head_branch_only: true
  delete_branch_after_merge: true
  release_to_main_policy: "pr-only-manual-merge"

commands:
  install: "pnpm install"
  lint: "pnpm lint:web"
  test: "pnpm verify:automation"
  build: "pnpm build:web"
  verify:
    - "python scripts/no_secrets_guard.py"
    - "pnpm verify:automation"

agents:
  planner: true
  implementer: true
  reviewer: true
  tester: true
  gitops: true
  agent_discussion_policy: "internal_codex_subagents"
  discord_for_agent_discussion: "summary_only"
