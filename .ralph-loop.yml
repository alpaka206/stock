project:
  name: "stock"
  repo: "alpaka206/stock"
  language: "ko"
  locale: "ko-KR"

goal: |
  이 저장소를 초보자도 쉽게 읽고, 숙련 사용자도 계속 열어두고 싶어 하는 완성형 주식 분석 사이트로 발전시킨다.
  국장과 미장을 모두 다루며, 시장 개요, 스크리너, 종목 상세, 뉴스, 캘린더, 히스토리가 하나의 연구 워크스페이스처럼 이어지게 만든다.
  차트는 단순 시각화가 아니라 실제 판단 보조 도구가 되어야 하며, 기본 이동평균선(5일, 10일, 20일, 60일, 120일), 거래량, 핵심 이벤트, 추세 해석, 리스크 경고를 함께 제공한다.
  패턴 도감과 현재 차트 유사 패턴을 함께 보여주고, "지금 이런 차트로 진행 중이에요" 수준으로 쉽게 설명하되 단정적 예측은 피한다.
  일반적인 기술 선택은 사용자에게 묻지 않고 구현, 복구, 검증, GitHub issue/PR 흐름까지 계속 진행한다.
  Discord는 원격 제어, 감사 로그, 필수 승인 요청 채널로만 사용한다.

minimum_done:
  - "국장과 미장 종목을 한 흐름 안에서 검색하고 비교할 수 있다"
  - "overview, radar, stocks/[symbol], history, news, calendar가 연구 흐름으로 연결된다"
  - "종목 상세 화면에서 가격 차트와 이동평균선(5/10/20/60/120), 거래량, 이벤트 마커가 함께 보인다"
  - "차트 해석 패널이 현재 추세, 지지/저항, 거래량 변화, 이동평균 배열, 변동성 위험을 설명형 한국어로 요약한다"
  - "패턴 도감 또는 패턴 카드 영역에서 cup with handle, double bottom, flat base 같은 대표 패턴을 쉽게 볼 수 있다"
  - "현재 차트가 어떤 패턴과 유사한지, 어느 단계인지, 무엇을 주의해서 봐야 하는지 한국어로 설명한다"
  - "초보자용 쉬운 설명과 숙련자용 밀도 높은 지표가 한 화면 안에서 공존한다"
  - "국장 데이터는 KRX, KIND, DART 계열 공식 출처와 연결 가능한 구조를 유지한다"
  - "미장 데이터는 SEC EDGAR, Nasdaq 계열 공식 출처와 연결 가능한 구조를 유지한다"
  - "데이터마다 출처, 지연 여부, unavailable 이유를 명확히 표시한다"
  - "변경사항이 issue 브랜치에만 커밋된다"
  - "issue 브랜치에서 develop_loop로 향하는 PR이 생성되거나 갱신된다"
  - "main, develop, develop_loop에는 직접 커밋하거나 직접 push하지 않는다"
  - "사용자 확인은 결제, 자격증명, 외부 계정, 프로덕션 배포, 비가역 데이터 작업일 때만 요청한다"

loop:
  max_iterations: 40
  failure_threshold: 3
  continue_without_user_by_default: true

ask_user_only_when:
  - "유료 서비스 과금이나 구독 변경이 필요하다"
  - "API key, secret, token, 외부 자격증명이 필요하다"
  - "외부 계정 로그인이나 권한 확인이 필요하다"
  - "프로덕션 배포가 필요하다"
  - "DB migration 또는 데이터 작업이 비가역적이거나 위험하다"

writing:
  language: "ko"
  style: "모든 진행 요약, Discord 메시지, 로그 요약, 설명, PR 요약은 한국어로 작성한다."
  avoid:
    - "불필요한 영어 설명"
    - "과장된 보고체"
    - "의미 없는 AI 상투어"

context_docs:
  - "docs/design/stock-reference-blueprint.md"
  - "docs/design/chart-pattern-atlas.md"
  - "docs/prompts/09-완성형-주식-분석-사이트.md"
  - "docs/design/design-memory.md"

product:
  target_users:
    - "주식을 잘 모르는 입문자"
    - "차트, 수급, 공시, 섹터 흐름을 같이 보는 숙련 사용자"
  markets:
    - "KRX: KOSPI, KOSDAQ, KONEX 관련 흐름"
    - "US: NYSE, NASDAQ, AMEX 관련 흐름"
  priorities:
    - "쉽게 읽히는 요약"
    - "깊이 있는 차트와 지표"
    - "공시, 뉴스, 캘린더, 섹터 문맥의 연결"
    - "데이터 출처와 지연 상태의 투명성"

chart_policy:
  default_overlays:
    - "MA5"
    - "MA10"
    - "MA20"
    - "MA60"
    - "MA120"
    - "Volume"
  interpretation_rules:
    - "상승 정배열, 하락 역배열, 단기선-중기선 교차, 거래량 급증, 장대 음봉/양봉, 갭, 전고점/전저점 돌파 여부를 설명한다"
    - "예측처럼 단정하지 말고 상승 유지 관찰, 과열 주의, 지지선 이탈 주의, 추세 전환 확인 필요 같은 라벨로 설명한다"
    - "차트 해석은 투자 조언이 아니라 현재 구조 해설이라는 점을 분명히 한다"
    - "대표 패턴 도감과 현재 차트 유사 패턴을 함께 보여주고, 유사 이유와 무효화 조건을 설명한다"
  novice_mode:
    - "한 줄 요약"
    - "왜 그런 판단이 나왔는지 쉬운 설명"
    - "패턴 그림 카드와 현재 차트 비교 요약"
  pro_mode:
    - "지표 근거"
    - "기간별 비교"
    - "이벤트와 차트의 시간 정렬"
    - "패턴 유사도, 거래량 확인, 무효화 기준"

references:
  inspirations:
    - "https://www.tradingview.com/support/solutions/43000718866-tradingview-stock-screener-trade-smarter-not-harder/"
    - "https://www.koyfin.com/features/market-dashboards/"
    - "https://finviz.com/help/screener.ashx"
    - "https://www.nasdaq.com/market-activity/stocks/screener"
    - "https://www.investing.com/technical/stocks-indicators"
  official_data_sources:
    - "https://data.krx.co.kr/"
    - "https://kind.krx.co.kr/common/JLDDST35000.html"
    - "https://dart2.fss.or.kr/"
    - "https://opendart.fss.or.kr/"
    - "https://www.sec.gov/search-filings"
    - "https://www.nasdaq.com/market-activity/"

runtime:
  bridge_host: "127.0.0.1"
  bridge_port: 8787
  ascii_workspace_drive: "X:"

discord:
  mode: "all"
  channel_id: ""
  thread_per_run: false
  notify_on:
    - "start"
    - "issue_created"
    - "pr_created"
    - "tests_failed_3_times"
    - "blocked"
    - "needs_paid_service"
    - "needs_secret"
    - "merge_done"
    - "complete"
  remote_commands:
    - "/ralph status"
    - "/ralph pause"
    - "/ralph resume"
    - "/ralph stop"
    - "/ralph nudge <message>"
    - "/ralph goal <message>"
    - "/ralph done <message>"
    - "/ralph logs"
    - "/ralph pr"

git:
  base_branch: "develop_loop"
  protected_branches:
    - "main"
    - "develop"
    - "develop_loop"
  no_commit_on:
    - "main"
    - "develop"
    - "develop_loop"
  no_direct_push_to:
    - "main"
    - "develop"
    - "develop_loop"
  issue_branch_prefix: "issue"
  pr_base: "develop_loop"
  merge_strategy: "squash"
  delete_branch_after_merge: true
  release_to_main_policy: "disabled"

commands:
  install: "pnpm install"
  lint: "pnpm lint:web"
  test: "pnpm verify:automation"
  build: "pnpm build:web"
  verify:
    - "python scripts/no_secrets_guard.py"
    - "pnpm verify:automation"

agents:
  planner: true
  implementer: true
  reviewer: true
  tester: true
  gitops: true
  agent_discussion_policy: "internal_codex_subagents"
  discord_for_agent_discussion: "summary_only"
