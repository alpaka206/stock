version: 1
updated_at: 2026-03-21T00:00:00+09:00
pages:
  - route: /overview
    name_ko: 시황 대시보드
    goal: 오늘 시장의 방향을 10초 안에 읽고 다음 탐색 화면으로 이동하는 시작 화면
    primary_blocks:
      - 지수 스트립
      - AI 시황 요약 카드
      - 시장 히트맵
      - 뉴스 패널
      - 섹터 강도 패널
      - 리스크 배너
    required_data:
      - 지수 / 환율 / 금리
      - 뉴스 요약
      - 섹터 강도
      - 시장 요약 JSON
    navigation_targets:
      - /radar
      - /stocks/[symbol]
      - /history

  - route: /radar
    name_ko: 관심종목 + 섹터 분석
    goal: 관심종목과 섹터 intelligence를 같은 화면에서 정리하는 핵심 작업 화면
    primary_layout:
      left: 폴더 트리, 태그 바로가기, 저장된 view preset
      center: AG Grid Community 기반 관심종목 그리드와 flat / sector view 전환
      right: 선택 섹터 요약, 리포트 요약, 일정, 주요 이슈, top pick
    required_capabilities:
      - 폴더화
      - 컬럼 토글
      - 정렬
      - 텍스트 필터
      - 섹터 기준 group view
      - 선택 섹터에 따른 우측 패널 동기화
      - 저장된 뷰 preset

  - route: /stocks/[symbol]
    name_ko: 종목 분석 워크스테이션
    goal: 한 종목의 핵심 판단 근거를 차트 중심으로 모아 보는 작업 화면
    primary_blocks:
      - 종목 검색
      - 대형 가격 차트
      - 이벤트 마커 / 보조지표 가이드
      - 사용자 규칙 / preset 패널
      - 점수 탭
      - 수급 탭
      - 공매도 / 옵션 탭
      - 이슈 분석 탭
    required_capabilities:
      - 티커 / 종목명 / 종목번호 검색
      - 6개 이상 규칙 토글
      - score breakdown + confidence
      - 수급 / 옵션 / 공매도 unavailable 상태 명시
      - 사용자 preset 저장

  - route: /history
    name_ko: 히스토리 / 이벤트 리플레이
    goal: 과거 급등과 급락의 이유를 차트와 타임라인을 함께 보며 다시 읽는 화면
    primary_blocks:
      - 종목 검색 + 날짜 범위 선택
      - 과거 차트 리플레이
      - 이벤트 / 뉴스 타임라인
      - 급등 / 급락 이유 요약 카드
      - 중복 지표 설명 카드
    required_capabilities:
      - 날짜 기준 차트 / 타임라인 동기화
      - 이벤트 클릭 시 차트 포커스 이동
      - 이전 / 다음 이벤트 이동
      - 과거 움직임 이유 JSON + UI 제공
