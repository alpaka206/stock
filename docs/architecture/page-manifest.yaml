version: 2
updated_at: 2026-05-16T00:00:00+09:00
pages:
  - route: /overview
    name_ko: 시장 개요
    goal: 사용자가 오늘의 시장 방향, 강한 섹터, 핵심 뉴스, 위험 요인을 빠르게 이해하는 시작 화면
    primary_blocks:
      - 데이터 상태 안내
      - 지수 스트립
      - 시장 요약 카드
      - 섹터 흐름
      - 핵심 뉴스
      - 위험 체크
    required_data:
      - 미국/한국 주요 지수
      - 섹터 점수와 대표 종목
      - 뉴스와 공시 요약
      - 누락 데이터와 신뢰도
    navigation_targets:
      - /radar
      - /stocks/[symbol]
      - /history

  - route: /radar
    name_ko: 관심 종목 레이더
    goal: 관심 종목을 검색, 필터, 정렬해 우선 확인할 종목과 이벤트를 고르는 작업 화면
    primary_layout:
      left: 폴더, 섹터, 태그, 저장된 보기
      center: 경량 관심 종목 테이블과 검색/정렬/보기 전환
      right: 선택 종목 요약, 감지 알림, 섹터 근거, 일정, 리포트, Top Pick
    required_capabilities:
      - 미국/한국 종목 통합 검색
      - 폴더/섹터/태그 필터
      - 점수, 등락률, 거래량, 상대강도 정렬
      - 선택 종목 상세 이동
      - 조건 감지 알림 표시

  - route: /stocks/[symbol]
    name_ko: 종목 분석
    goal: 한 종목의 가격, 기술적 신호, 이벤트, 뉴스와 공시, 판단 기록을 차트 중심으로 확인하는 화면
    primary_blocks:
      - 종목 검색
      - 가격 차트
      - 이벤트 마커
      - 기술적 신호 토글
      - 패턴 후보
      - 판단 기록 저장
      - 점수/수급/공매도/뉴스 탭
    required_capabilities:
      - 티커, 종목명, 종목번호 검색
      - 이동평균선과 주요 지표 토글
      - 뉴스와 공시 근거 표시
      - 서버 기반 판단 기록 저장

  - route: /history
    name_ko: 이벤트 히스토리
    goal: 과거 급등락과 이벤트를 차트 위에서 복기하고 이전 판단 기록을 다시 보는 화면
    primary_blocks:
      - 종목/기간 필터
      - 가격 복기 차트
      - 이벤트 타임라인
      - 움직인 이유
      - 겹친 신호
      - 저장된 판단 기록
    required_capabilities:
      - 이벤트 선택과 차트 동기화
      - 이전/다음 이벤트 이동
      - 과거 움직임 이유 표시
      - 판단 기록 조회

  - route: /workspace
    name_ko: 워크스페이스
    goal: 로그인, 구독 플랜, 리포트 이메일, 미디어 더빙/자막 작업을 한곳에서 관리하는 보조 화면
    primary_blocks:
      - 세션 상태와 로그인
      - 구독 플랜별 제공 범위
      - 리포트 미리보기와 이메일 발송
      - 리포트 예약과 발송 이력
      - 미디어 원본 자료 저장
      - Perso 현지화 작업 생성, 제출, 상태 동기화
    required_capabilities:
      - Google OAuth 진입과 개발용 로그인
      - HttpOnly cookie 기반 세션 조회
      - 서버 저장 리포트 예약과 발송 이력 조회
      - 서버 저장 미디어 작업 상태 조회
      - provider key 미설정 시 목데이터 생성 없이 명확한 오류 표시
