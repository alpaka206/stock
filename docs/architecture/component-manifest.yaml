version: 2
updated_at: 2026-05-16T00:00:00+09:00
shared:
  components:
    - name: AppShell
      kind: shell
      role: 핵심 화면 공통 사이드바, 상단바, 언어 선택, 테마 전환을 제공한다.
    - name: AppProviders
      kind: provider
      role: theme, i18n, query provider를 루트에서 묶는다.
    - name: ResearchPanel
      kind: surface
      role: 분석 화면의 제목, 설명, 액션, content padding을 통일한다.
    - name: DataSourceNotice
      kind: trust
      role: 실제 데이터가 아닌 mock/fixture/fallback 상태에서 `(목데이터)`를 명확히 표시한다.
    - name: InstrumentSearch
      kind: search
      role: 티커, 종목명, 종목번호 검색과 최근 조회 종목 이동을 제공한다.
    - name: ResearchLineChart
      kind: chart
      role: 가격, 거래량, 보조지표, 이벤트 마커, active point, highlight range를 표시한다.
    - name: ResearchSnapshotCard
      kind: history
      role: 사용자가 저장한 판단 기록을 조회하고 삭제할 수 있게 표시한다.

pages:
  overview:
    components:
      - name: IndexStrip
        kind: summary
        role: 주요 지수와 금리/섹터 벤치마크를 상단에서 보여준다.
      - name: AiMarketSummaryCard
        kind: summary
        role: 시장 요약과 핵심 driver를 짧은 문장으로 제공한다.
      - name: MarketHeatmap
        kind: visualization
        role: 섹터 점수와 변화율을 빠르게 비교한다.
      - name: NewsPanel
        kind: feed
        role: 시장 해석에 영향을 주는 뉴스와 공시를 시간순으로 정리한다.
      - name: SectorStrengthPanel
        kind: ranking
        role: 강한 섹터와 대표 종목을 연결한다.
      - name: RiskBanner
        kind: alert
        role: 신뢰도, 누락 데이터, 주요 위험 요인을 먼저 확인하게 한다.

  radar:
    components:
      - name: RadarWorkbench
        kind: workspace
        role: 검색, 필터, 정렬, 선택 종목 컨텍스트를 한 화면에서 제공한다.
      - name: WatchlistFolderTree
        kind: filter
        role: 관심 종목 그룹을 폴더 구조로 탐색한다.
      - name: RadarTable
        kind: table
        role: 대규모 그리드 라이브러리 없이 관심 종목을 가볍게 표시한다.
      - name: AlertCard
        kind: alert
        role: 조건 감지 알림과 관련 종목 이동을 제공한다.

  stock_detail:
    components:
      - name: StockDetailPage
        kind: page
        role: 종목 차트, 기술적 신호, 판단 기록, 이슈 탭을 조합한다.
      - name: RulePresetPanel
        kind: controls
        role: 이동평균, 지지선, 거래량, 상대강도 신호를 켜고 끈다.
      - name: SnapshotForm
        kind: mutation
        role: 사용자의 판단 기록을 서버 API에 저장한다.

  history:
    components:
      - name: HistoryPage
        kind: page
        role: 종목/기간 필터, 가격 복기 차트, 이벤트 타임라인, 판단 기록을 조합한다.
      - name: EventTimeline
        kind: timeline
        role: 뉴스, 공시, 실적 이벤트를 선택 가능한 시간순 목록으로 표시한다.

  workspace:
    components:
      - name: WorkspacePage
        kind: page
        role: 세션, 구독 플랜, 리포트, 미디어 현지화 작업을 서버 API와 연결한다.
      - name: PlanCard
        kind: pricing
        role: 구독별 관심 종목, 판단 기록, 리포트, 미디어 현지화 제공 범위를 보여준다.
      - name: ReportSection
        kind: mutation
        role: 리포트 미리보기, 이메일 발송, 예약 저장을 제공한다.
      - name: MediaSection
        kind: workflow
        role: 미디어 자료 저장, Perso 작업 생성, 제출, 동기화를 제공한다.
