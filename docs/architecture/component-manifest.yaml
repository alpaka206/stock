version: 1
updated_at: 2026-04-13T00:00:00+09:00
shared:
  components:
    - name: ResearchAppShell
      kind: shell
      role: 4개 메인 화면의 공통 sidebar, topbar, theme toggle을 제공하는 앱 shell
    - name: AppProviders
      kind: provider
      role: Theme provider와 TanStack Query provider를 루트에서 묶는 초기화 레이어
    - name: AgResearchGrid
      kind: grid
      role: AG Grid Community 공통 래퍼. 한국어 locale, 기본 colDef, legacy theme 설정 포함
    - name: ResearchLineChart
      kind: chart
      role: 가격 시계열, 거래량, 가이드, 이벤트 마커, active point, highlight range를 함께 그리는 공통 차트
    - name: InstrumentSearch
      kind: search
      role: 티커 / 종목명 / 종목번호 검색과 최근 조회 심볼 바로가기를 제공하는 공통 검색 컴포넌트
    - name: ResearchPanel
      kind: card
      role: 카드 헤더, 액션, content padding을 통일하는 공통 패널

    - name: DataSourceNotice
      kind: trust
      role: live 화면에는 노출하지 않고, mock / fixture / fallback 상태에서만 연결 경고를 얇게 노출하는 공통 안내

pages:
  overview:
    components:
      - name: IndexStrip
        kind: summary
        role: 주요 지수 / 금리 / 섹터 벤치마크를 첫 줄에서 읽게 하는 상단 스트립
      - name: AiMarketSummaryCard
        kind: card
        role: 시장 요약과 핵심 driver를 2~3개의 문장으로 압축
      - name: MarketHeatmap
        kind: visualization
        role: 섹터 점수와 변화율을 빠르게 읽고 다음 화면으로 이동시키는 시각화
      - name: NewsPanel
        kind: feed
        role: 시황 해석에 필요한 뉴스 headline과 sourced summary를 정리
      - name: SectorStrengthPanel
        kind: ranking
        role: 강한 섹터와 관련 종목 이동 동선을 연결
      - name: RiskBanner
        kind: alert
        role: 금리, 과열, missingData를 상단에서 바로 확인시키는 경고 배너

  radar:
    components:
      - name: WatchlistFolderTree
        kind: nav
        role: 폴더 트리와 관심 그룹을 탐색하는 왼쪽 탐색 트리
      - name: RadarViewPresetList
        kind: controls
        role: 저장된 뷰 preset을 저장 / 적용 / 삭제하는 리스트
      - name: WatchlistToolbar
        kind: controls
        role: 검색, view mode, group mode, sort, column toggle을 제공하는 중앙 툴바
      - name: WatchlistGrid
        kind: grid
        role: AG Grid 기반 flat view 작업 영역
      - name: SectorStackedGrid
        kind: grid
        role: enterprise grouping 없이 섹터별 pre-grouped section grid를 보여주는 대체 뷰
      - name: SelectedSectorSummaryPanel
        kind: analysis
        role: 선택 섹터 요약, 촉매, top pick을 우측에 노출
      - name: BrokerReportSummaryPanel
        kind: analysis
        role: 선택 섹터 기준 브로커 메모를 요약
      - name: SectorSchedulePanel
        kind: timeline
        role: 섹터별 체크 일정과 event note를 정리
      - name: SectorIssuePanel
        kind: feed
        role: 선택 섹터 기준 주요 이슈를 노출
      - name: SectorTopPickPanel
        kind: ranking
        role: 섹터별 우선 검토 종목을 보여주는 패널

  stock_detail:
    components:
      - name: StockSearchBar
        kind: search
        role: 티커 / 종목명 / 종목번호 검색과 최근 조회 종목 바로가기를 제공
      - name: PriceChartPanel
        kind: chart
        role: 가격 시계열, 이벤트 마커, 활성 포인트를 중심에 크게 노출
      - name: EventMarkerStrip
        kind: timeline
        role: 차트 아래에서 이벤트를 선택하고 포커스를 이동시키는 카드 스트립
      - name: RulePresetSidebar
        kind: controls
        role: 규칙 토글과 사용자 preset 저장 / 적용 / 삭제를 관리
      - name: ScoreBreakdownPanel
        kind: score
        role: 총점, breakdown, confidence를 한 번에 보여준다
      - name: FlowPanel
        kind: analysis
        role: 수급 카드와 unavailable 상태를 함께 노출
      - name: ShortOptionPanel
        kind: analysis
        role: 공매도 / 옵션 지표 또는 unavailable 상태를 노출
      - name: IssueAnalysisPanel
        kind: analysis
        role: 종목 / 섹터 / 시황 이슈를 하단 탭에서 분석

  history:
    components:
      - name: HistoryFilterBar
        kind: controls
        role: 종목 검색, range select, custom from / to 입력을 묶는 상단 필터 바
      - name: ReplayChart
        kind: chart
        role: 선택 이벤트와 연결된 과거 가격 차트 리플레이
      - name: EventTimeline
        kind: timeline
        role: 이벤트 / 뉴스 타임라인과 선택 상태를 동기화
      - name: EventStepControls
        kind: controls
        role: 이전 / 다음 이벤트로 이동하는 step control
      - name: MoveReasonSummaryCard
        kind: analysis
        role: 급등 / 급락 이유를 다시 읽는 카드
      - name: IndicatorOverlapCard
        kind: analysis
        role: 변곡점에서 겹친 보조지표 신호를 설명하는 카드
