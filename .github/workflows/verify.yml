name: verify

on:
  pull_request:
    branches:
      - develop_loop
      - develop
      - main
  push:
    branches:
      - develop_loop

jobs:
  verify:
    runs-on: ubuntu-latest
    name: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          if [ -f apps/api/requirements.txt ]; then pip install -r apps/api/requirements.txt; fi
          if [ -f omx_discord_bridge/requirements.txt ]; then pip install -r omx_discord_bridge/requirements.txt; fi
      - name: Verify Ralph setup
        run: python scripts/verify_ralph_setup.py
      - name: Verify automation
        run: pnpm verify:automation
