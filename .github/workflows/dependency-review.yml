name: dependency-review

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: NPM audit
        id: npm_audit
        continue-on-error: true
        working-directory: apps/web
        run: pnpm audit --audit-level moderate

      - name: NPM license summary
        id: npm_license
        continue-on-error: true
        working-directory: apps/web
        run: npx --yes license-checker-rseidelsohn --summary

      - name: Write summary
        shell: bash
        env:
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
          NPM_LICENSE_OUTCOME: ${{ steps.npm_license.outcome }}
        run: |
          {
            echo "## Supply Chain Audit"
            echo ""
            echo "- npm audit: ${NPM_AUDIT_OUTCOME}"
            echo "- npm license summary: ${NPM_LICENSE_OUTCOME}"
            echo ""
            echo "현재 프런트 저장소의 npm 의존성 취약점과 라이선스 상태를 요약합니다."
            echo "실제 경보와 자동 수정은 Dependabot alerts 및 security updates에서 추적합니다."
          } >> "$GITHUB_STEP_SUMMARY"
