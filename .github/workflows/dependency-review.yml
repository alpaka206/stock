name: dependency-review

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: NPM audit
        id: npm_audit
        continue-on-error: true
        working-directory: apps/web
        run: pnpm audit --audit-level moderate

      - name: Python audit
        id: python_audit
        continue-on-error: true
        shell: bash
        run: |
          python -m venv .venv-audit
          source .venv-audit/bin/activate
          python -m pip install --upgrade pip pip-audit pip-licenses
          python - <<'PY'
          import pathlib
          import tomllib

          with open("apps/api/pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          req_path = pathlib.Path("apps/api/.audit-requirements.txt")
          req_path.write_text("\n".join(data["project"]["dependencies"]) + "\n", encoding="utf-8")
          print(req_path)
          PY
          pip-audit -r apps/api/.audit-requirements.txt --progress-spinner off
          pip-licenses --from=mixed --with-system=false --summary

      - name: NPM license summary
        id: npm_license
        continue-on-error: true
        working-directory: apps/web
        run: npx --yes license-checker-rseidelsohn --summary

      - name: Write summary
        shell: bash
        env:
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
          PYTHON_AUDIT_OUTCOME: ${{ steps.python_audit.outcome }}
          NPM_LICENSE_OUTCOME: ${{ steps.npm_license.outcome }}
        run: |
          {
            echo "## Supply Chain Audit"
            echo ""
            echo "- npm audit: ${NPM_AUDIT_OUTCOME}"
            echo "- python audit: ${PYTHON_AUDIT_OUTCOME}"
            echo "- npm license summary: ${NPM_LICENSE_OUTCOME}"
            echo ""
            echo "현재 저장소의 npm, Python 의존성 취약점과 라이선스 상태를 요약합니다."
            echo "실제 경보와 자동 수정은 Dependabot alerts 및 security updates에서 추적합니다."
          } >> "$GITHUB_STEP_SUMMARY"
